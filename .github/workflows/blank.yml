name: Cloudflare Free Desktop
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Instalace Desktopu a VNC
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver websockify novnc
          mkdir ~/.vnc
          echo "heslo123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: 2. Start VNC a Cloudflare Tunelu
        run: |
          # Spuštění plochy
          vncserver :1 -geometry 1280x720 -depth 24
          # Most pro prohlížeč (noVNC)
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          
          # Instalace Cloudflare bez registrace
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          
          # Spuštění tunelu a uložení logu, abychom viděli URL
          ./cloudflared-linux-amd64 tunnel --url http://localhost:6080 > cf.log 2>&1 &
          
          echo "Čekám na vygenerování linku..."
          sleep 20
          echo "-------------------------------------------------------"
          echo "TVŮJ LINK PRO XBOX / TV JE ZDE:"
          grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' cf.log
          echo "-------------------------------------------------------"

      - name: 3. Udržet naživu (6 hodin)
        run: sleep 21600
