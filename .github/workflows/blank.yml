name: Neko Smooth Streamer
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Spuštění Neko (WebRTC Browser)
        run: |
          # Spustíme Neko v Dockeru - je to v podstatě hotový "Watch Party" server
          docker run -d \
            --name neko \
            -p 8080:8080 \
            -p 52000-52100:52000-52100/udp \
            -e NEKO_PASSWORD=heslo123 \
            -e NEKO_ADMIN_PASSWORD=admin123 \
            -e NEKO_SCREEN=1280x720@30 \
            m1k1o/neko:firefox
          
      - name: 2. Instalace a start Cloudflare Tunelu
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          
          # Tunelujeme port 8080, kde běží Neko rozhraní
          ./cloudflared-linux-amd64 tunnel --url http://localhost:8080 > cf.log 2>&1 &
          
          sleep 20
          echo "-------------------------------------------------------"
          echo "ODKAZ PRO PLYNULÉ VIDEO (Neko WebRTC):"
          grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' cf.log
          echo "-------------------------------------------------------"
          echo "Heslo do místnosti: heslo123"

      - name: 3. Keep Alive
        run: sleep 21600
