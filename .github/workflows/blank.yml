name: Cloud Browser RDP
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Instalace Desktopu a VNC
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver websockify
          mkdir ~/.vnc
          echo "heslo123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
      - name: Instalace prohlížeče
        run: |
          sudo apt install -y firefox
          
      - name: Nastavení Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Start VNC a Tunnelu
        run: |
          vncserver :1 -geometry 1280x720 -depth 24
          # Spuštění websockify pro přístup přes prohlížeč (noVNC)
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          ngrok http 6080 --log=stdout &
          sleep 10
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          
      - name: Keep Alive
        run: sleep 21600 # Poběží to 6 hodin
